[project]
name = "myapp"
version = "1.0.0"
dependencies = [
    "flask>=2.0.0",
    "requests~=2.25.0",
]

[project.optional-dependencies]
extras = [
    "redis>=4.0.0",
]

[tool.hatch.envs.test]
dependencies = [
    "pytest>=7.0.0",
    "coverage[toml]>=6.0",
]

[tool.hatch.envs.lint]
dependencies = ["ruff>=0.1.0"]
extra-dependencies = ["mypy>=1.0.0"]
