name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: |
          cd dependi-lsp
          cargo fmt --check

      - name: Clippy
        run: |
          cd dependi-lsp
          cargo clippy -- -D warnings

      - name: Run tests
        run: |
          cd dependi-lsp
          cargo test

      - name: Check rustdoc
        run: |
          cd dependi-lsp
          cargo doc --no-deps

  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: dependi-lsp

  build-extension:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build extension
        run: |
          cd dependi-zed
          cargo build --release --target wasm32-wasip1

  docs-validation:
    name: Validate architecture doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate mermaid blocks
        run: bash ./scripts/check_mermaid_syntax.sh docs/architecture.md

      - name: Validate links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-loopback docs/architecture.md
          fail: true
