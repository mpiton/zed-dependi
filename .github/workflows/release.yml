name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: dependi-lsp
            asset_name: dependi-lsp-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: dependi-lsp
            asset_name: dependi-lsp-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: dependi-lsp
            asset_name: dependi-lsp-aarch64-apple-darwin
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: dependi-lsp
            asset_name: dependi-lsp-aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: dependi-lsp.exe
            asset_name: dependi-lsp-x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: contains(matrix.target, 'linux')
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux')
        run: cargo install cargo-zigbuild@0.19.8 --locked

      - name: Build (Linux - GLIBC 2.17)
        if: contains(matrix.target, 'linux')
        run: |
          cd dependi-lsp
          cargo zigbuild --release --target ${{ matrix.target }}.2.17

      - name: Build (macOS / Windows)
        if: ${{ !contains(matrix.target, 'linux') }}
        run: |
          cd dependi-lsp
          cargo build --release --target ${{ matrix.target }}

      - name: Verify GLIBC compatibility
        if: contains(matrix.target, 'linux')
        run: |
          binary="dependi-lsp/target/${{ matrix.target }}/release/dependi-lsp"
          max_glibc=$(readelf -V "$binary" 2>/dev/null | grep -oP 'GLIBC_\K[0-9.]+' | sort -V | tail -1)
          if [ -z "$max_glibc" ]; then
            echo "::error::Could not determine GLIBC requirement from binary (no GLIBC_ symbols found)"
            exit 1
          fi
          echo "Maximum GLIBC required: $max_glibc"
          if [ "$(printf '%s\n' "2.17" "$max_glibc" | sort -V | tail -1)" != "2.17" ]; then
            echo "::error::Binary requires GLIBC $max_glibc, expected <= 2.17"
            exit 1
          fi
          echo "✓ GLIBC compatibility verified: requires <= $max_glibc"

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd dependi-lsp/target/${{ matrix.target }}/release
          sha256sum ${{ matrix.artifact_name }} > ${{ matrix.asset_name }}.binary.sha256
          tar -czvf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          mv ${{ matrix.asset_name }}.tar.gz ../../../../
          mv ${{ matrix.asset_name }}.binary.sha256 ../../../../

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dependi-lsp/target/${{ matrix.target }}/release
          sha256sum ${{ matrix.artifact_name }} > ${{ matrix.asset_name }}.binary.sha256
          7z a ${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}
          mv ${{ matrix.asset_name }}.zip ../../../../
          mv ${{ matrix.asset_name }}.binary.sha256 ../../../../
        shell: bash

      - name: Upload artifact (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.binary.sha256

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.zip
            ${{ matrix.asset_name }}.binary.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.binary.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
